<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6bff"/>
      <stop offset="100%" stop-color="#0042c7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd29a"/>
      <stop offset="100%" stop-color="#ff7d2d"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Bold "B" letterform centered, white -->
  <!-- Drawn as a single path so it scales cleanly. Left spine + two stacked bowls. -->
  <path fill="#ffffff" d="
    M 34 26
    L 68 26
    A 20 20 0 0 1 88 46
    Q 88 56 79 62
    Q 92 67 92 80
    A 22 22 0 0 1 70 102
    L 34 102
    Z
    M 50 42
    L 50 56
    L 66 56
    A 7 7 0 0 0 66 42
    Z
    M 50 72
    L 50 86
    L 70 86
    A 7 7 0 0 0 70 72
    Z
  "/>

  <!-- Download arrow: merged accent triangle that reads as "raw image coming down" -->
  <path fill="url(#accent)" d="
    M 92 72
    L 112 72
    L 102 94
    Z
  "/>

  <!-- Pixel dot in top-right marking "raw pixels" -->
  <rect x="98" y="22" width="10" height="10" rx="2" fill="#ffd29a"/>
</svg>
